<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VirusTotal Lookup</title><style>
*{box-sizing:border-box}body{margin:0;background:#f6f7fb;color:#172033;font:15px/1.5 system-ui,sans-serif}.app{max-width:1000px;margin:auto;padding:38px 20px}h1{font-size:28px;margin:0 0 6px}.intro,.note{color:#667085}.grid{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;margin:22px 0 8px}.input{width:100%;border:1px solid #d0d5dd;border-radius:8px;padding:10px;background:#fff;color:#172033;font:14px Consolas,monospace;outline:none}.items{min-height:100px;resize:vertical}.button{border:0;border-radius:7px;background:#2956d7;color:#fff;padding:10px 13px;font-weight:600;cursor:pointer}.button:disabled{opacity:.6}.results{display:grid;gap:10px;margin-top:18px}.card{background:#fff;border:1px solid #d0d5dd;border-radius:9px;padding:13px}.card h2{font:600 14px Consolas,monospace;margin:0 0 8px;overflow-wrap:anywhere}.card h3{font-size:13px;margin:14px 0 5px}.card dl{display:grid;grid-template-columns:max-content 1fr;gap:4px 12px;margin:0;font-size:13px}.card dt{color:#667085}.card dd{margin:0;overflow-wrap:anywhere}.tag,.verdict{display:inline-block;border-radius:999px;margin:1px 3px 1px 0;padding:2px 8px;font:12px Consolas,monospace}.tag{background:#e8eaed}.verdict{font-weight:700}.malicious{background:#fee4e2;color:#b42318}.benign{background:#d1fadf;color:#027a48}.unknown{background:#fef0c7;color:#b54708}.record{background:#e8eaed;color:#475467}.evidence{margin:0;padding-left:18px;font:12px/1.55 Consolas,monospace}.error{border-color:#fecdca;background:#fffbfa;color:#b42318}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style></head><body><main class="app"><h1>VirusTotal Lookup</h1><p class="intro">Bulk lookup for file hashes, domains, and IP addresses. Separate inputs with commas or new lines.</p><div class="grid"><input id="key" class="input" type="password" autocomplete="off" placeholder="VirusTotal API key"><textarea id="items" class="input items" spellcheck="false" placeholder="example.com, 8.8.8.8&#10;44d88612fea8a8f36de82e1278abb02f"></textarea><button id="check" class="button">Check</button></div><p id="status" class="note">Start <code>vt-proxy.ps1</code>, then open this file. The key is not stored.</p><div id="results" class="results" aria-live="polite"></div></main><script>
const key=document.querySelector('#key'),items=document.querySelector('#items'),check=document.querySelector('#check'),status=document.querySelector('#status'),results=document.querySelector('#results'),base='http://127.0.0.1:8787/api/v3/';
const isHash=x=>/^[a-f0-9]{32}$|^[a-f0-9]{40}$|^[a-f0-9]{64}$/i.test(x),isIp=x=>/^(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[0-9]{1,2})[.]){3}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[0-9]{1,2})$/.test(x)||/^[0-9a-f:]+$/i.test(x)&&x.includes(':');
const esc=x=>String(x??'—').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),tags=x=>(x||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')||'—',bytes=x=>x==null?'—':x<1024?`${x} B`:x<1048576?`${(x/1024).toFixed(1)} KB`:`${(x/1048576).toFixed(1)} MB`;
const stats=a=>a.last_analysis_stats||{},detected=a=>{const s=stats(a);return (s.malicious||0)+(s.suspicious||0)>0};
function verdict(a){const s=stats(a),m=s.malicious||0,sp=s.suspicious||0,h=s.harmless||0;if(m>0)return {label:'Malicious',css:'malicious',detail:`${m} malicious detection${m===1?'':'s'}${sp?`, ${sp} suspicious`:''}`};if(sp>0)return {label:'Unknown',css:'unknown',detail:`${sp} suspicious detection${sp===1?'':'s'}; review required`};if(h>0)return {label:'Benign',css:'benign',detail:`${h} harmless detection${h===1?'':'s'}, no malicious or suspicious detections`};return {label:'Unknown',css:'unknown',detail:'No conclusive scan verdict'}}
function engineEvidence(a){return Object.values(a.last_analysis_results||{}).filter(x=>x.category==='malicious'||x.category==='suspicious').slice(0,5).map(x=>`${x.engine_name||'Unnamed engine'}: ${x.result||x.category}`)}
function objectName(o){const a=o.attributes||{},s=stats(a),count=(s.malicious||0)+(s.suspicious||0);if(o.type==='resolution')return `${a.host_name||o.id} → ${a.ip_address||''}`;return `${a.meaningful_name||a.names?.[0]||o.id}${count?` (${count} detection${count===1?'':'s'})`:''}`}
async function relatedEvidence(type,id,k){const set=type==='file'?['contacted_domains','contacted_ips','dropped_files']:type==='domain'?['communicating_files','resolutions']:['communicating_files','resolutions'];const collection=type==='file'?'files':type==='domain'?'domains':'ip_addresses';const settled=await Promise.all(set.map(async rel=>{try{const r=await fetch(`${base}${collection}/${encodeURIComponent(id)}/${rel}?limit=3`,{headers:{'X-API-Key':k}});if(!r.ok)return [];const b=await r.json();return (b.data||[]).filter(o=>o.type==='resolution'||detected(o.attributes||{})).map(o=>`${rel.replaceAll('_',' ')}: ${objectName(o)}`)}catch{return []}}));return settled.flat().slice(0,6)}
async function card(item,d,k){const a=d.attributes||{},file=d.type==='file',ip=d.type==='ip_address',v=verdict(a),type=file?'File':ip?'IP address':'Domain',label=file?'File info':ip?'IP info':'Domain info',info=file?`${esc(a.meaningful_name||a.names?.[0]||'Unknown file')} · ${esc(a.type_description||a.type_tag||'Unknown type')} · ${bytes(a.size)}`:ip?`${esc(a.as_owner||'No network owner data')} · ${esc(a.country||'Unknown country')}`:`${esc(a.registrar||'No registrar data')} · ${esc(a.creation_date?new Date(a.creation_date*1000).toLocaleDateString():'No creation date')}`;let why='';if(v.label==='Malicious'){const engines=engineEvidence(a),related=await relatedEvidence(d.type,d.id,k);why=`<h3>Why malicious</h3><ul class="evidence">${engines.map(x=>`<li>Detection: ${esc(x)}</li>`).join('')||'<li>VirusTotal reported malicious detections.</li>'}${related.map(x=>`<li>Related object: ${esc(x)}</li>`).join('')||'<li>No accessible malicious related objects were returned.</li>'}</ul>`}return `<article class="card"><h2>${esc(item)}</h2><dl><dt>Verdict</dt><dd><span class="verdict ${v.css}">${v.label}</span> ${esc(v.detail)}</dd><dt>Type</dt><dd>${type}</dd><dt>Reputation</dt><dd>${esc(a.reputation)}</dd><dt>Tags</dt><dd>${tags(a.tags)}</dd><dt>${label}</dt><dd>${info}</dd></dl>${why}</article>`}
function errorCard(item,message,noRecord=false){return `<article class="card ${noRecord?'':'error'}"><h2>${esc(item)}</h2><dl><dt>Verdict</dt><dd><span class="verdict ${noRecord?'record':'unknown'}">${noRecord?'No record':'Lookup error'}</span> ${esc(message)}</dd></dl></article>`}
check.onclick=async()=>{const k=key.value.trim(),list=[...new Set(items.value.split(/[\n,]+/).map(x=>x.trim()).filter(Boolean))];if(!k){status.textContent='Enter an API key.';return}if(!list.length){status.textContent='Enter a hash, domain, or IP address.';return}check.disabled=true;results.innerHTML='';status.textContent=`Checking ${list.length} item(s)...`;const cards=await Promise.all(list.map(async item=>{const path=isHash(item)?`files/${item}`:isIp(item)?`ip_addresses/${encodeURIComponent(item)}`:`domains/${encodeURIComponent(item)}`;try{const r=await fetch(base+path,{headers:{'X-API-Key':k}}),body=await r.json();if(r.status===404)return errorCard(item,'VirusTotal has no record for this item.',true);if(!r.ok)throw new Error(body.error?.message||`Request failed (${r.status})`);return card(item,body.data,k)}catch(e){return errorCard(item,e.message==='Failed to fetch'?'The local proxy is unavailable. Keep vt-proxy.ps1 open, then reload this page.':e.message)}}));results.innerHTML=cards.join('');status.textContent=`Finished ${list.length} lookup(s).`;check.disabled=false};
</script><script>
const nativeFetch=window.fetch,domainWhois=new Map();
const attachWhois=()=>document.querySelectorAll('.card').forEach(card=>{const domain=card.querySelector('h2')?.textContent.trim(),whois=domainWhois.get(domain);if(!whois||card.querySelector('.whois'))return;const title=document.createElement('h3');title.textContent='WHOIS';const pre=document.createElement('pre');pre.className='whois';pre.textContent=whois;card.append(title,pre)});
window.fetch=async(...args)=>{const response=await nativeFetch(...args),url=String(args[0]);const match=url.match(/\/api\/v3\/domains\/([^/?]+)$/);if(match&&response.ok){try{const body=await response.clone().json();domainWhois.set(decodeURIComponent(match[1]),body.data?.attributes?.whois||'');attachWhois()}catch{}}return response};
new MutationObserver(attachWhois).observe(results,{childList:true,subtree:true});
</script><style>.whois{max-height:260px;overflow:auto;white-space:pre-wrap;overflow-wrap:anywhere;margin:0;background:#f8fafc;border:1px solid #eaecf0;border-radius:6px;padding:9px;font:12px/1.5 Consolas,monospace}</style></body></html>
