<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Text to HTML Converter</title><style>
*{box-sizing:border-box}body{margin:0;background:#f6f7fb;color:#172033;font:15px/1.5 system-ui,sans-serif}.app{max-width:1100px;margin:auto;padding:38px 20px}h1{font-size:28px;margin:0 0 6px}.intro,.note{color:#667085}.toolbar{display:flex;flex-wrap:wrap;gap:5px;margin:22px 0 12px}.toolbar button{background:#fff;border:1px solid #d0d5dd;border-radius:7px;padding:7px 10px;color:#344054;font-weight:600;cursor:pointer}.panes{display:grid;grid-template-columns:1fr 1fr;gap:18px}.pane-head{display:flex;justify-content:space-between;margin-bottom:8px}.pane h2{font-size:14px;margin:0}.copy{border:0;border-radius:6px;background:#2956d7;color:#fff;padding:7px 12px;font-weight:600;cursor:pointer}.editor,textarea{width:100%;min-height:430px;resize:vertical;border:1px solid #d0d5dd;border-radius:9px;padding:14px;background:#fff;color:#172033;font:14px/1.55 Consolas,monospace;outline:none}.editor{overflow:auto;white-space:pre-wrap}.editor:empty:before{content:attr(data-placeholder);color:#98a2b3}.editor:focus,textarea:focus{border-color:#2956d7;box-shadow:0 0 0 3px #dbe5ff}.editor pre,.editor .math{background:#e8eaed;border-radius:4px;color:#202124;font:10.5px/1.55 Consolas,monospace}.editor pre{display:block;margin:8px 0;padding:9px 11px;white-space:pre-wrap;word-break:break-word}.editor .math{display:inline-block;padding:2px 5px}.editor img{display:block;max-width:100%;height:auto;margin:8px 0}@media(max-width:700px){.panes{grid-template-columns:1fr}.editor,textarea{min-height:280px}}
</style></head><body><main class="app"><h1>Text to HTML</h1><p class="intro">Format selected text, then edit or copy the generated HTML.</p><div class="toolbar"><button data-c="bold">Bold</button><button data-c="italic">Italic</button><button data-c="underline">Underline</button><button data-c="indent">Indent</button><button data-c="outdent">Outdent</button><button data-c="insertUnorderedList">Bullets</button><button data-c="insertOrderedList">Numbering</button><button data-c="code">Code block</button><button data-c="math">Math</button><button id="image">Image</button><input id="file" type="file" accept="image/*" hidden></div><section class="panes"><div class="pane"><div class="pane-head"><h2>Text input</h2></div><div id="source" class="editor" contenteditable="true" data-placeholder="Type or paste text here..."></div><p class="note">Select text and use the toolbar.</p></div><div class="pane"><div class="pane-head"><h2>HTML output</h2><button id="copy" class="copy">Copy HTML</button></div><textarea id="output" spellcheck="false" placeholder="Your HTML will appear here..."></textarea><p id="status" class="note">Output is editable and formatted automatically.</p></div></section></main><script>
const source=document.querySelector('#source'),output=document.querySelector('#output'),file=document.querySelector('#file'),status=document.querySelector('#status');let range;const block=new Set(['div','p','pre','ul','ol','li','h1','h2','h3','blockquote']);const clean=html=>{const box=document.createElement('div');box.innerHTML=html;box.querySelectorAll('b,strong,i,em,u,font').forEach(n=>n.replaceWith(...n.childNodes));box.querySelectorAll('[style]').forEach(n=>{['font-family','font-size','font-style','font-weight','text-decoration'].forEach(p=>n.style.removeProperty(p));if(!n.getAttribute('style'))n.removeAttribute('style')});return box.innerHTML};const pretty=html=>{const box=document.createElement('div');box.innerHTML=html;const out=[];const walk=(n,d)=>{if(n.nodeType===3){const t=n.textContent.trim();if(t)out.push('  '.repeat(d)+t);return}if(n.nodeType!==1)return;const tag=n.tagName.toLowerCase(),nested=[...n.children].some(c=>block.has(c.tagName.toLowerCase()));if(!block.has(tag)||!nested){out.push('  '.repeat(d)+n.outerHTML);return}out.push('  '.repeat(d)+n.outerHTML.match(/^<[^>]+>/)[0]);n.childNodes.forEach(c=>walk(c,d+1));out.push('  '.repeat(d)+`</${tag}>`)};box.childNodes.forEach(n=>walk(n,0));return out.join('\n')};const sync=()=>output.value=pretty(clean(source.innerHTML));const save=()=>{const s=getSelection();if(s.rangeCount&&source.contains(s.anchorNode))range=s.getRangeAt(0).cloneRange()};const restore=()=>{if(range){const s=getSelection();s.removeAllRanges();s.addRange(range)}};source.oninput=()=>{save();sync()};source.onkeyup=source.onmouseup=save;output.oninput=()=>source.innerHTML=output.value;output.onblur=sync;document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{source.focus();restore();const c=b.dataset.c;if(c==='code')document.execCommand('formatBlock',false,'pre');else if(c==='math'){const s=getSelection();if(!s.rangeCount||s.isCollapsed)return;const r=s.getRangeAt(0),n=document.createElement('span');n.className='math';n.append(r.extractContents());r.insertNode(n);s.removeAllRanges()}else document.execCommand(c);sync()});document.querySelector('#image').onclick=()=>file.click();file.onchange=()=>{const f=file.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{source.focus();restore();document.execCommand('insertImage',false,r.result);sync()};r.readAsDataURL(f);file.value=''};document.querySelector('#copy').onclick=async()=>{try{await navigator.clipboard.writeText(output.value)}catch{output.select();document.execCommand('copy')}status.textContent='Copied to clipboard.'};
</script><script>
// Paste plain text so Word/webpage markup and non-breaking spaces cannot create phantom gaps.
document.querySelector('#source').addEventListener('paste',event=>{
  event.preventDefault();
  const pasted=(event.clipboardData||window.clipboardData).getData('text/plain')
    .replace(/\r\n?/g,'\n').replace(/\u00a0/g,' ')
    .replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n');
  document.execCommand('insertText',false,pasted);
  document.querySelector('#source').dispatchEvent(new Event('input',{bubbles:true}));
});
</script></body></html>
