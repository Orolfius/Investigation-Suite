<!doctype html><meta charset="utf-8"><title>AbuseIPDB Checker</title><style>body{max-width:900px;margin:35px auto;font:15px system-ui;background:#f6f7fb;color:#172033}input,button{padding:10px;border:1px solid #ccd;border-radius:7px}input{width:35%}button{background:#2956d7;color:white}article{background:white;border:1px solid #d0d5dd;border-radius:9px;padding:15px;margin-top:15px}dl{display:grid;grid-template-columns:max-content 1fr;gap:5px 15px}dt{color:#667085}pre{white-space:pre-wrap}</style><h1>AbuseIPDB Checker</h1><p>Enter an IP or domain. Domains resolve to IPs; checks cover the last six months.</p><input id=k type=password placeholder="AbuseIPDB API key"><input id=i placeholder="IP address or domain"><button onclick="go()">Check</button><p id=s>Run <code>proxy.ps1</code> first. Your key is not stored.</p><main id=o></main><script>const e=x=>String(x??'Not provided by AbuseIPDB').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));async function go(){try{let r=await fetch('http://127.0.0.1:8788/check?input='+encodeURIComponent(i.value),{headers:{'X-API-Key':k.value}}),b=await r.json();if(!r.ok)throw Error(b.error);o.innerHTML=b.data.map(x=>`<article><h2>${e(x.ipAddress)}</h2><dl><dt>Confidence</dt><dd>${e(x.abuseConfidenceScore)}%</dd><dt>ISP</dt><dd>${e(x.isp)}</dd><dt>Usage type</dt><dd>${e(x.usageType)}</dd><dt>ASN</dt><dd>Not provided by AbuseIPDB</dd><dt>Domain name</dt><dd>${e(x.domain)}</dd><dt>Country</dt><dd>${e(x.countryName)} (${e(x.countryCode)})</dd><dt>City</dt><dd>Not provided by AbuseIPDB</dd><dt>Reports (6 months)</dt><dd>${e(x.totalReports)}</dd></dl><h3>Recent reports</h3><pre>${e((x.reports||[]).map(r=>r.reportedAt+' — '+(r.comment||'No comment')).join('\n')||'None')}</pre></article>`).join('')}catch(x){s.textContent=x.message==='Failed to fetch'?'Proxy unavailable. Start proxy.ps1.':x.message}}</script>
